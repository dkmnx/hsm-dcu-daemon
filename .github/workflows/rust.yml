name: Rust CI

on:
  push:
    branches: [main, rust-port]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: Check (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (unprivileged)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  privileged_test:
    name: Test (privileged — TUN + serial)
    runs-on: ubuntu-latest
    needs: check
    if: false # disabled during mock phase
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y iproute2
      - run: cargo test --workspace --features privileged -- --ignored

  build:
    name: Build Release (strip + size check)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --workspace
      - name: Check binary size
        env:
          # Override with `SIZE_BUDGET=8388608 cargo build ...` for known-exception releases.
          SIZE_BUDGET: ${{ vars.SIZE_BUDGET || '7340032' }}  # 7 MB default
        run: |
          SIZE=$(stat -c%s target/release/dcu-daemon)
          echo "dcu-daemon binary size: $SIZE bytes (budget: $SIZE_BUDGET)"
          if [ "$SIZE" -gt "$SIZE_BUDGET" ]; then
            echo "ERROR: Binary too large (>$SIZE_BUDGET bytes)"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            target/release/dcu-daemon
            target/release/dcuctl
